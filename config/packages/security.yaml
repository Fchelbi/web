security:
    password_hashers:
        App\Entity\User:
            algorithm: auto
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                success_handler: App\Security\LoginSuccessHandler
            logout:
                path: app_logout
                target: app_login
                invalidate_session: true
                # ← Supprimé clear_site_data (non supporté Symfony)
                # ← À la place: delete_cookies supprime le cookie session
                delete_cookies:
                    PHPSESSID: ~
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800
                path: /
    access_control:
    - { path: ^/easyadmin, roles: ROLE_ADMIN }
    - { path: ^/login,   roles: PUBLIC_ACCESS }
    - { path: ^/signup,  roles: PUBLIC_ACCESS }
    - { path: ^/verify,  roles: PUBLIC_ACCESS }
    - { path: ^/2fa,     roles: PUBLIC_ACCESS }
    - { path: ^/check-auth, roles: PUBLIC_ACCESS }
    - { path: ^/admin,   roles: ROLE_ADMIN }
    - { path: ^/coach,   roles: ROLE_COACH }
    - { path: ^/patient, roles: ROLE_PATIENT } 
    - { path: ^/check-blocked, roles: PUBLIC_ACCESS }          