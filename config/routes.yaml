consultation_list:
    path: /consultations
    controller: App\Controller\ConsultationController::index
    methods: [GET]

google_connect:
    path: /google/connect
    controller: App\Controller\ConsultationController::googleConnect
    methods: [GET]

google_callback:
    path: /google/callback
    controller: App\Controller\ConsultationController::googleCallback
    methods: [GET]

ai_suggest:
    path: /ai/suggest
    controller: App\Controller\ConsultationController::aiSuggest
    methods: [POST]

consultation_add:
    path: /consultation/add
    controller: App\Controller\ConsultationController::add
    methods: [GET, POST]

consultation_add_with_psychologue:
    path: /consultation/add/{psychologue}
    controller: App\Controller\ConsultationController::add
    methods: [GET, POST]

consultation_delete:
    path: /consultation/delete/{id}
    controller: App\Controller\ConsultationController::delete
    methods: [POST]

psy_consultations:
    path: /psy/consultations
    controller: App\Controller\ConsultationController::psyList
    methods: [GET]

psy_accept:
    path: /psy/accept/{id}
    controller: App\Controller\ConsultationController::accept
    methods: [POST]

psy_cancel:
    path: /psy/cancel/{id}
    controller: App\Controller\ConsultationController::cancel
    methods: [POST]

consultation_edit:
    path: /consultation/edit/{id}
    controller: App\Controller\ConsultationController::edit
    methods: [GET, POST]

psychologue_list:
    path: /psychologues
    controller: App\Controller\PsychologueController::index
    methods: [GET]
